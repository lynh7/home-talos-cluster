{{- if .Values.ciliumLoadBalancerIPPools.enabled }}
{{- range .Values.ciliumLoadBalancerIPPools.pools }}
---
apiVersion: "cilium.io/v2alpha1"
kind: CiliumLoadBalancerIPPool
metadata:
  name: {{ .name | quote }}
spec:
  {{- if .allowFirstLastIPs }}
  allowFirstLastIPs: {{ .allowFirstLastIPs }}
  {{- end }}
  blocks:
  {{- range .blocks }}
  - {{- if .cidr }}
    cidr: {{ .cidr | quote }}
    {{- end }}
    {{- if and .start .stop }}
    start: {{ .start | quote }}
    stop: {{ .stop | quote }}
    {{- end }}
  {{- end }}
{{- end }}
{{- end }}