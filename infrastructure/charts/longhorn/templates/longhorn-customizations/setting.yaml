{{- if .Values.customizations.taintTolerationSetting.enabled }}
apiVersion: longhorn.io/v1beta2
kind: Setting
metadata:
  name: taint-toleration
  namespace: longhorn-system
value: |
  [
    {
      "key": "critical-components",
      "operator": "Exists",
      "effect": "NoSchedule"
    }
  ]
{{- end }}