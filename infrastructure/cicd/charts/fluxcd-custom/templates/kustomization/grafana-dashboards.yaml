apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rollout-grafana-dashboards
  namespace: flux-system
spec:
  interval: 5m
  chart:
    spec:
      chart: ./infrastructure/charts/grafana-dashboards
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      interval: 2m