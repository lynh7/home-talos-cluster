# Source: external-secrets-operator/charts/vaultwarden/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-secrets-operator-vaultwarden
  labels:
    app.kubernetes.io/name: vaultwarden
    app.kubernetes.io/instance: external-secrets-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vaultwarden
      app.kubernetes.io/instance: external-secrets-operator
  template:
    metadata:
      annotations:
        {}
      labels:
        app.kubernetes.io/name: vaultwarden
        app.kubernetes.io/instance: external-secrets-operator
    spec:
      serviceAccountName: vaultwarden-kubernetes-secrets
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      nodeSelector:
        {}
      tolerations:
        []
      affinity:
        {}
      initContainers:
        - name: init-permissions
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "mkdir -p /data/home/.config && echo 'Directories created successfully'"]
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
      containers:
        - name: vaultwarden
          image: "ghcr.io/antoniolago/vaultwarden-kubernetes-secrets:1.0.3"
          imagePullPolicy: IfNotPresent
          command: ["dotnet", "VaultwardenK8sSync.dll", "sync"]
          envFrom:
            - configMapRef:
                name: external-secrets-operator-vaultwarden-config
                optional: true
          env:
            # Always set these required paths
            - name: HOME
              value: "/data/home"
            - name: XDG_CONFIG_HOME
              value: "/data/home/.config"
            - name: DATABASE_PATH
              value: "/data/sync.db"
            # Propagate SYNC__FIELD_* env overrides from values.env.fields
            - name: SYNC__FIELD__NAMESPACES
              value: "namespaces"
            - name: SYNC__FIELD__SECRETNAME
              value: "secret-name"
            - name: SYNC__FIELD__SECRETKEYPASSWORD
              value: "secret-key-password"
            - name: SYNC__FIELD__SECRETKEYUSERNAME
              value: "secret-key-username"
            - name: SYNC__FIELD__SECRETKEY
              value: "secret-key"
            - name: SYNC__FIELD__INLINEKVPREFIX
              value: "kv"
            - name: SYNC__FIELD__SECRETBLOCKPREFIX
              value: "secret"
            # Mount secrets as environment variables
            - name: BW_CLIENTID
              valueFrom:
                secretKeyRef:
                  name: vaultwarden-kubernetes-secrets
                  key: BW_CLIENTID
                  optional: false
            - name: BW_CLIENTSECRET
              valueFrom:
                secretKeyRef:
                  name: vaultwarden-kubernetes-secrets
                  key: BW_CLIENTSECRET
                  optional: false
            - name: VAULTWARDEN__MASTERPASSWORD
              valueFrom:
                secretKeyRef:
                  name: vaultwarden-kubernetes-secrets
                  key: VAULTWARDEN__MASTERPASSWORD
                  optional: false
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
          resources:
            limits:
              cpu: 100m
              memory: 256Mi
            requests:
              cpu: 25m
              memory: 128Mi
          startupProbe:
            exec:
              command: ["sh", "-c", "test -f /proc/1/status"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            exec:
              command: ["sh", "-c", "test -f /proc/1/status"]
            periodSeconds: 60
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["sh", "-c", "test -f /proc/1/status"]
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 2
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
