apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-stack-grafana-alloy
  namespace: monitoring
  labels:
    helm.sh/chart: grafana-alloy-1.2.0
    app.kubernetes.io/name: grafana-alloy
    app.kubernetes.io/instance: grafana-stack
    app.kubernetes.io/version: "v1.10.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: alloy
    app.kubernetes.io/component: config
data:
  config.alloy: |-
    logging {
      level = "info"
    }
    
    // ─────────────────────────────────────────────────────────
    // Metrics
    // ─────────────────────────────────────────────────────────
    prometheus.operator.servicemonitors "default" {
      forward_to = [prometheus.remote_write.victoria.receiver]
    }
    
    prometheus.operator.podmonitors "default" {
      forward_to = [prometheus.remote_write.victoria.receiver]
    }
    
    prometheus.scrape "external-node" {
      targets = [
        {
          __address__ = "192.168.10.99:9100",
          job = "external-node"
        }
      ]
    
      scrape_interval = "30s"
      scrape_timeout = "10s"
    
      // Add node label for consistency
      rule {
        target_label = "node"
        replacement  = "external-node"
      }
    
      forward_to = [prometheus.remote_write.victoria.receiver]
    }
    
    prometheus.remote_write "victoria" {
      endpoint {
        url = "http://victoria-metrics-single-server.monitoring.svc.cluster.local:8428/api/v1/write"
    
        queue_config {
          max_samples_per_send = 2000
          max_shards           = 30
          capacity             = 10000
        }
      }
    
      external_labels = {
        cluster = "homelab-staging",
      }
    }
    
    // ─────────────────────────────────────────────────────────
    // Logs 
    // ─────────────────────────────────────────────────────────
    discovery.kubernetes "pods" {
      role = "pod"
    }
    
    discovery.relabel "pod_logs" {
      targets = discovery.kubernetes.pods.targets
    
      // Drop pods that are not running — avoids scraping terminating pods
      rule {
        source_labels = ["__meta_kubernetes_pod_phase"]
        action        = "keep"
        regex         = "Running"
      }
    
      // Namespace as label
      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }
    
      // Pod name
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }
    
      // Container name — important when a pod has multiple containers
      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "container"
      }
    
      // App label (most deployments set this)
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app"]
        target_label  = "app"
      }
    
      // app.kubernetes.io/name (Helm charts use this)
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
        target_label  = "app"
        regex         = "(.+)"  // only override if non-empty
      }
    
      // Node the pod runs on
      rule {
        source_labels = ["__meta_kubernetes_pod_node_name"]
        target_label  = "node"
      }
    
      // Compose the job label: namespace/app
      rule {
        source_labels = ["namespace", "app"]
        separator     = "/"
        target_label  = "job"
      }
    }
    
    loki.source.kubernetes "pod_logs" {
      targets    = discovery.relabel.pod_logs.output
      forward_to = [loki.write.victorialogs.receiver]
    }
    
    loki.write "victorialogs" {
      endpoint {
        url = "http://victoria-logs-single-server.monitoring.svc.cluster.local:9428/insert/loki/api/v1/push"
      }
    }
