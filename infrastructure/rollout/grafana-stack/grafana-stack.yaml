# Source: grafana-stack/charts/grafana/templates/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-stack
  namespace: monitoring
  labels:
    helm.sh/chart: grafana-9.3.0
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: grafana-stack
    app.kubernetes.io/version: "12.1.0"
data:
  
  grafana.ini: |
    [analytics]
    check_for_updates = true
    [grafana_net]
    url = https://grafana.net
    [log]
    mode = console
    [paths]
    data = /var/lib/grafana/
    logs = /var/log/grafana
    plugins = /var/lib/grafana/plugins
    provisioning = /etc/grafana/provisioning
    [server]
    domain = ''
  datasources.yaml: |
    apiVersion: 1
    datasources:
    - access: proxy
      isDefault: true
      name: VictoriaMetrics
      type: prometheus
      url: http://victoria-metrics-single-server.monitoring.svc.cluster.local:8428
  dashboardproviders.yaml: |
    apiVersion: 1
    providers:
    - disableDeletion: false
      editable: true
      folder: ""
      name: default
      options:
        path: /var/lib/grafana/dashboards/default
      orgId: 1
      type: file
