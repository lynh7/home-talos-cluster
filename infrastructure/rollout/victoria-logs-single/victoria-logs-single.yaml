# Source: victoria-logs-single/templates/server.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: victoria-logs-single-server
  namespace: default
  labels: 
    app: server
    app.kubernetes.io/instance: victoria-logs-single
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: victoria-logs-single
    app.kubernetes.io/version: v1.48.0
    helm.sh/chart: victoria-logs-single-0.11.30
spec:
  podManagementPolicy: OrderedReady
  updateStrategy: {}
  replicas: 1
  serviceName: victoria-logs-single-server
  selector:
    matchLabels: 
      app: server
      app.kubernetes.io/instance: victoria-logs-single
      app.kubernetes.io/name: victoria-logs-single
  template:
    metadata:
      labels: 
        app: server
        app.kubernetes.io/instance: victoria-logs-single
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: victoria-logs-single
    spec:
      securityContext: 
        fsGroup: 2000
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: vlogs
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
          image: victoriametrics/victoria-logs:v1.48.0
          imagePullPolicy: IfNotPresent
          args: 
            - --envflag.enable
            - --envflag.prefix=VM_
            - --http.shutdownDelay=15s
            - --httpListenAddr=:9428
            - --loggerFormat=json
            - --retentionPeriod=1
            - --storageDataPath=/storage
          ports:
            - name: http
              containerPort: 9428
          readinessProbe: 
            failureThreshold: 3
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe: 
            failureThreshold: 10
            initialDelaySeconds: 30
            periodSeconds: 30
            tcpSocket:
              port: http
            timeoutSeconds: 5
          resources: 
            limits:
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 128Mi
          volumeMounts:
            - name: server-volume
              mountPath: /storage
            
      nodeSelector: 
        node-role.kubernetes.io/control-plane: ""
      tolerations: 
        - effect: NoSchedule
          key: critical-components
          operator: Equal
          value: critical
      terminationGracePeriodSeconds: 60
      volumes:
        
  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: server-volume
      spec:
        accessModes: 
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
