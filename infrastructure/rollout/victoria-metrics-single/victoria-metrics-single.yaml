# Source: victoria-metrics-single/templates/server.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: victoria-metrics-single-server
  namespace: monitoring
  labels: 
    app: server
    app.kubernetes.io/instance: victoria-metrics-single
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: victoria-metrics-single
    app.kubernetes.io/version: v1.120.0
    helm.sh/chart: victoria-metrics-single-0.22.0
spec:
  podManagementPolicy: OrderedReady
  updateStrategy: {}
  replicas: 1
  serviceName: victoria-metrics-single-server
  selector:
    matchLabels: 
      app: server
      app.kubernetes.io/instance: victoria-metrics-single
      app.kubernetes.io/name: victoria-metrics-single
  template:
    metadata:
      labels: 
        app: server
        app.kubernetes.io/instance: victoria-metrics-single
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: victoria-metrics-single
        app.kubernetes.io/version: v1.120.0
        helm.sh/chart: victoria-metrics-single-0.22.0
    spec:
      serviceAccountName: victoria-metrics-single-server
      automountServiceAccountToken: true
      securityContext: 
        {}
      containers:
        - name: vmsingle
          securityContext: 
            {}
          image: victoriametrics/victoria-metrics:v1.120.0
          imagePullPolicy: IfNotPresent
          args: 
            - --envflag.enable
            - --envflag.prefix=VM_
            - --httpListenAddr=:8428
            - --loggerFormat=json
            - --retentionPeriod=2w
            - --storageDataPath=/storage
          ports:
            - name: http
              containerPort: 8428
          readinessProbe: 
            failureThreshold: 3
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe: 
            failureThreshold: 10
            initialDelaySeconds: 30
            periodSeconds: 30
            tcpSocket:
              port: http
            timeoutSeconds: 5
          resources: 
            limits:
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 128Mi
          volumeMounts:
            - name: server-volume
              mountPath: /storage
            
      nodeSelector: 
        node-role.kubernetes.io/control-plane: ""
      tolerations: 
        - effect: NoSchedule
          key: critical-components
          operator: Equal
          value: critical
      terminationGracePeriodSeconds: 60
      volumes:
        
  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: server-volume
      spec:
        accessModes: 
          - ReadWriteOnce
        resources:
          requests:
            storage: 16Gi
