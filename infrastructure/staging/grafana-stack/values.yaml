######################################
####### Grafana Stack Config #########
######################################
grafana:
  service:
    type: LoadBalancer
  serviceMonitor:
    enabled: true
  #-- Schedule Grafana to run on master node  
  tolerations:
    - key: "critical-components"
      operator: "Equal"
      value: "critical"
      effect: "NoSchedule"
  nodeSelector:
    node-role.kubernetes.io/control-plane: ""
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: VictoriaMetrics
          type: prometheus        # VM is Prometheus-compatible, use prometheus type
          url: http://victoria-metrics-single-server.monitoring.svc.cluster.local:8428
          access: proxy
          isDefault: true
          editable: false
          jsonData:
            timeInterval: "30s"  # match your Alloy scrape_interval
  
        - name: Loki
          type: loki
          url: http://loki.monitoring.svc.cluster.local:3100
          access: proxy
          editable: false
          jsonData:
            maxLines: 1000
  
      deleteDatasources:
        - name: Prometheus        # clean up the old default if it existed
          orgId: 1

#################################
#### Grafana Alloy Config #####
#################################
grafana-alloy:
  alloy:
    configMap:
      create: true
      content: |
        logging {
          level = "info"
        }

        // ─────────────────────────────────────────────────────────
        // Metrics
        // ─────────────────────────────────────────────────────────
        prometheus.operator.servicemonitors "default" {
          forward_to = [prometheus.remote_write.victoria.receiver]
        }
        
        prometheus.operator.podmonitors "default" {
          forward_to = [prometheus.remote_write.victoria.receiver]
        }

        prometheus.remote_write "victoria" {
          endpoint {
            url = "http://victoria-metrics-single-server.monitoring.svc.cluster.local:8428/api/v1/write"

            queue_config {
              max_samples_per_send = 2000
              max_shards           = 30
              capacity             = 10000
            }
          }

          external_labels = {
            cluster = "homelab-staging",
          }
        }

        // ─────────────────────────────────────────────────────────
        // Logs 
        // ─────────────────────────────────────────────────────────
        discovery.kubernetes "pods" {
          role = "pod"
        }

        loki.source.kubernetes "pod_logs" {
          targets    = discovery.kubernetes.pods.targets
          forward_to = [loki.write.victorialogs.receiver]
        }

        loki.write "victorialogs" {
          endpoint {
            // VictoriaLogs has a Loki-compatible push endpoint
            url = "http://victoria-logs.monitoring.svc.cluster.local:9428/insert/loki/api/v1/push"
          }
        }
        
  controller:
    type: 'deployment'
    tolerations:
      - key: "critical-components"
        operator: "Equal"
        value: "critical"
        effect: "NoSchedule"
  service:
    enabled: true
    type: LoadBalancer
  serviceMonitor:
    enabled: true
