######################################
####### Grafana Stack Config #########
######################################
grafana:
  service:
    type: LoadBalancer
  #-- Schedule Grafana to run on master node  
  tolerations:
    - key: "critical-components"
      operator: "Equal"
      value: "critical"
      effect: "NoSchedule"
  nodeSelector:
    node-role.kubernetes.io/control-plane: ""

#################################
#### Grafana Alloy Config #####
#################################
grafana-alloy:
  alloy:
    configMap:
      create: true
      content: |
        {{ .Files.Get "alloy-config.hcl" | nindent 6 }}
  controller:
    type: 'deployment'
    tolerations:
      - key: "critical-components"
        operator: "Equal"
        value: "critical"
        effect: "NoSchedule"
  serviceMonitor:
    enabled: false
