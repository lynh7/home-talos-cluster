######################################
####### Grafana Stack Config #########
######################################
grafana:
  service:
    type: LoadBalancer
  #-- Schedule Grafana to run on master node  
  tolerations:
    - key: "critical-components"
      operator: "Equal"
      value: "critical"
      effect: "NoSchedule"
  nodeSelector:
    node-role.kubernetes.io/control-plane: ""

#################################
#### Grafana Alloy Config #####
#################################
grafana-alloy:
  alloy:
    configMap:
      create: true
      content: |
        logging {
          level = "info"
        }

        // ─────────────────────────────────────────────────────────
        // ServiceMonitor-based discovery
        // Alloy watches all ServiceMonitor CRDs cluster-wide
        // and auto-configures scrape jobs from them.
        // ─────────────────────────────────────────────────────────
        prometheus.operator.servicemonitors "default" {
          forward_to = [prometheus.remote_write.victoria.receiver]
        }

        // ─────────────────────────────────────────────────────────
        // Node Exporter
        // ─────────────────────────────────────────────────────────
        discovery.kubernetes "node_exporter" {
          role = "pod"

          namespaces {
            names = ["monitoring"]
          }
        }

        discovery.relabel "node_exporter" {
          targets = discovery.kubernetes.node_exporter.targets

          rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
            action        = "keep"
            regex         = "prometheus-node-exporter"
          }

          rule {
            source_labels = ["__address__"]
            action        = "replace"
            regex         = "([^:]+)(?::\\d+)?"
            replacement   = "$1:9100"
            target_label  = "__address__"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_node_name"]
            target_label  = "node"
          }
        }

        prometheus.scrape "node_exporter" {
          targets         = discovery.relabel.node_exporter.output
          forward_to      = [prometheus.remote_write.victoria.receiver]
          scrape_interval = "30s"
        }

        // ─────────────────────────────────────────────────────────
        // Remote Write to VictoriaMetrics
        // ─────────────────────────────────────────────────────────
        prometheus.remote_write "victoria" {
          endpoint {
            url = "http://victoria-metrics-single-server.monitoring.svc.cluster.local:8428/api/v1/write"

            queue_config {
              max_samples_per_send = 2000
              max_shards           = 30
              capacity             = 10000
            }
          }

          external_labels = {
            cluster = "production",
          }
        }
        
  controller:
    type: 'deployment'
    tolerations:
      - key: "critical-components"
        operator: "Equal"
        value: "critical"
        effect: "NoSchedule"
  service:
    enabled: true
    type: LoadBalancer
  serviceMonitor:
    enabled: false
