######################################
####### Grafana Stack Config #########
######################################
grafana:
  service:
    type: LoadBalancer
  serviceMonitor:
    enabled: true
    #-- Allowing schedule Grafana to run on master node  
  tolerations:
    - key: "critical-components"
      operator: "Equal"
      value: "critical"
      effect: "NoSchedule"
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: VictoriaMetrics
          type: prometheus        # VM is Prometheus-compatible, use prometheus type
          url: http://victoria-metrics-single-server.monitoring.svc.cluster.local:8428
          access: proxy
          isDefault: true
          editable: false
          jsonData:
            timeInterval: "30s"
  
        - name: VictoriaLogs
          type: loki
          url: http://http://victoria-logs-single-server.monitoring.svc.cluster.local:9428
          access: proxy
          editable: false
          jsonData:
            maxLines: 1000
  
      deleteDatasources:
        - name: Prometheus
          orgId: 1

  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: VictoriaMetrics
          type: prometheus
          url: http://victoria-metrics-single-server.monitoring.svc.cluster.local:8428
          access: proxy
          isDefault: true

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: ""
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default  
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      folder: /var/lib/grafana/dashboards
      searchNamespace: monitoring
      provider:
        foldersFromFilesStructure: true

  persistence:
    type: pvc
    enabled: true
    size: 500Mi
#################################
#### Grafana Alloy Config #####
#################################
grafana-alloy:
  alloy:
    configMap:
      create: true
      content: |
        logging {
          level = "info"
        }

        // ─────────────────────────────────────────────────────────
        // Metrics
        // ─────────────────────────────────────────────────────────
        prometheus.operator.servicemonitors "default" {
          forward_to = [prometheus.remote_write.victoria.receiver]
        }
        
        prometheus.operator.podmonitors "default" {
          forward_to = [prometheus.remote_write.victoria.receiver]
        }

        prometheus.scrape "external_ubuntu_node" {
          targets = [
            {
              __address__ = "192.168.10.99:9100",
              job         = "rasp4-node",
              node        = "rasp4-node",
            },
          ]

          scrape_interval = "30s"
          scrape_timeout  = "10s"

          forward_to = [prometheus.remote_write.victoria.receiver]
        }

        prometheus.scrape "external_minidesk_node" {
          targets = [
            {
              __address__ = "192.168.10.52:9100",
              job         = "minidesk-host",
              node        = "minidesk-host",
            },
          ]

          scrape_interval = "30s"
          scrape_timeout  = "10s"

          forward_to = [prometheus.remote_write.victoria.receiver]
        }

        prometheus.remote_write "victoria" {
          endpoint {
            url = "http://victoria-metrics-single-server.monitoring.svc.cluster.local:8428/api/v1/write"

            queue_config {
              max_samples_per_send = 2000
              max_shards           = 30
              capacity             = 10000
            }
          }

          external_labels = {
            cluster = "homelab-staging",
          }
        }

        // ─────────────────────────────────────────────────────────
        // Logs 
        // ─────────────────────────────────────────────────────────
        discovery.kubernetes "pods" {
          role = "pod"
        }

        discovery.relabel "pod_logs" {
          targets = discovery.kubernetes.pods.targets

          // Drop pods that are not running — avoids scraping terminating pods
          rule {
            source_labels = ["__meta_kubernetes_pod_phase"]
            action        = "keep"
            regex         = "Running"
          }

          // Namespace as label
          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            target_label  = "namespace"
          }

          // Pod name
          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            target_label  = "pod"
          }

          // Container name — important when a pod has multiple containers
          rule {
            source_labels = ["__meta_kubernetes_pod_container_name"]
            target_label  = "container"
          }

          // App label (most deployments set this)
          rule {
            source_labels = ["__meta_kubernetes_pod_label_app"]
            target_label  = "app"
          }

          // app.kubernetes.io/name (Helm charts use this)
          rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
            target_label  = "app"
            regex         = "(.+)"  // only override if non-empty
          }

          // Node the pod runs on
          rule {
            source_labels = ["__meta_kubernetes_pod_node_name"]
            target_label  = "node"
          }

          // Compose the job label: namespace/app
          rule {
            source_labels = ["namespace", "app"]
            separator     = "/"
            target_label  = "job"
          }
        }

        loki.source.kubernetes "pod_logs" {
          targets    = discovery.relabel.pod_logs.output
          forward_to = [loki.write.victorialogs.receiver]
        }

        loki.write "victorialogs" {
          endpoint {
            url = "http://victoria-logs-single-server.monitoring.svc.cluster.local:9428/insert/loki/api/v1/push"
          }
        }
        
  controller:
    type: 'deployment'
    tolerations:
      - key: "critical-components"
        operator: "Equal"
        value: "critical"
        effect: "NoSchedule"
  service:
    enabled: true
    type: LoadBalancer
  serviceMonitor:
    enabled: true
