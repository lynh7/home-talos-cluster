longhornUI:
  replicas: 1
csi:
  # -- Replica count of the CSI Attacher
  attacherReplicaCount: 3
  # -- Replica count of the CSI Provisioner
  provisionerReplicaCount: 3
  # -- Replica count of the CSI Resizer
  resizerReplicaCount: 3
  # -- Replica count of the CSI Snapshotter
  snapshotterReplicaCount: 3
# defaultSettings:
#   deletingConfirmationFlag: true

#################################
##### Longhorn UI Service #######
#################################
service:
  ui:
    type: LoadBalancer