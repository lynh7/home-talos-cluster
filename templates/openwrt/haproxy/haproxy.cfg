global
    log /dev/log local0
    maxconn 4096
    daemon

defaults
    log     global
    mode    tcp
    option  tcplog
    timeout connect 5s
    timeout client  30s
    timeout server  30s

#------------------------------------------------------------
# Frontend: accept raw TLS on port 443, inspect SNI only
#------------------------------------------------------------
frontend https_in
    bind *:443
    mode tcp

    # Capture SNI for logging
    tcp-request inspect-delay 5s
    tcp-request content accept if { req.ssl_hello_type 1 }

    # Order matters: more-specific rule FIRST
    use_backend cluster_hosts if { req.ssl_sni -m end .cluster.tlta.online}
    use_backend wildcard_hosts if { req.ssl_sni -m end .tlta.online}

    # Optional: default fallback
    default_backend wildcard_hosts

#------------------------------------------------------------
# Backend: *.cluster.tlta.online→ Host 2
#------------------------------------------------------------
backend cluster_hosts
    mode tcp
    balance roundrobin          # or leastconn / source
    option ssl-hello-chk        # health-check via TLS hello
    server host2 192.168.10.50:443 check

#------------------------------------------------------------
# Backend: *.tlta.online→ Host 1
#------------------------------------------------------------
backend wildcard_hosts
    mode tcp
    balance roundrobin
    option ssl-hello-chk
    server host1 192.168.10.99:443 check